<!--
  File: platform-kpi-dropdown.component.html
  Description: Platform KPI dropdown menu template
  Navigation menu for all platform KPI pages
-->

<div class="dropdown" [class.open]="isOpen">
  <button class="nav-btn" type="button" (click)="onToggleMenu()">
    Platform KPI
    <span class="chevron">▾</span>
  </button>
  <ul class="dropdown-menu" [class.visible]="isOpen">
    <li *ngFor="let option of options">
      <button type="button" (click)="onSelection(option.path)">{{ option.label }}</button>
    </li>
  </ul>
</div>
