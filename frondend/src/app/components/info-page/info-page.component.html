<!--
  File: info-page.component.html
  Description: Generic information page template
  Displays dynamic page content from route data
-->

<section class="info-page">
  <div class="info-card">
    <div class="icon-container">
      <div class="page-icon">📊</div>
    </div>
    <h2>{{ pageTitle }}</h2>
    <p>{{ description }}</p>
    <p class="helper-text">
      This page is ready for content. You can add charts, tables, or forms relevant to
      <strong>{{ pageTitle }}</strong>.
    </p>
  </div>
</section>
